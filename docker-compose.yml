services:
    prolog-api:
        build:
            context: .
            dockerfile: backend/Dockerfile
        ports:
            - "4000:4000"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
            interval: 10s
            timeout: 5s
            retries: 3
        restart: unless-stopped

    web:
        build:
            context: ./web
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
            - PROLOG_API_URL=http://prolog-api:4000
        depends_on:
            prolog-api:
                condition: service_healthy
        restart: unless-stopped
